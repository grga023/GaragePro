{% extends "base.html" %}
{% block title %}{{ 'Uredi servis' if shop else 'Novi servis' }}{% endblock %}
{% block content %}
<h4 class="mb-3">{{ '✏️ Uredi servis' if shop else '➕ Novi servis' }}</h4>

<form method="post" enctype="multipart/form-data" class="card card-body">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Naziv servisa</label>
      <input name="name" class="form-control" value="{{ shop.name if shop else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Kontakt</label>
      <input name="contact" class="form-control" value="{{ shop.contact if shop else '' }}">
    </div>
    <div class="col-md-8">
      <label class="form-label">Adresa</label>
      <input name="address" class="form-control" value="{{ shop.address if shop else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Logo</label>
      <input name="logo" type="file" class="form-control" accept="image/*">
      {% if shop and shop.logo_path %}
      <div class="mt-2">
        <img src="{{ url_for('media', filename=shop.logo_path) }}" alt="Logo" style="max-height:60px">
      </div>
      {% endif %}
    </div>
  </div>

  <div class="mt-3">
    <button class="btn btn-success">💾 Sačuvaj</button>
    <a href="{{ url_for('moderator.index') }}" class="btn btn-outline-secondary ms-2">Nazad</a>
  </div>
</form>
{% endblock %}
