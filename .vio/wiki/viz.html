ORKER = \"radnik\"` \u2014 sees only their own services.\n\nKey methods:\n- `set_password(password)` / `check_password(password)` \u2014 bcrypt-style hashing via Werkzeug.\n- `is_admin` property \u2014 checks `self.role == ROLE_ADMIN`.\n- `is_active` property \u2014 maps to the `active` column (Flask-Login interface).\n\n## Company\n\nA **single-row** table (always `id=1`) holding the shop's identity: name, address, contact info, and logo path. Populated on first run via the [Dashboard & Setup](main.md) page.\n\n## Car\n\nIndexed by `plate` (unique). Tracks vehicle details (brand, model, engine, fuel type, year), owner contact info, photo, and last-known mileage. Has a one-to-many relationship with `Service` (cascade delete-orphan).\n\nThe `description` property produces a human-readable summary like `\"BMW 320 2.0 dizel 2020\"`.\n\nFuel types are defined as a constant list: `benzin`, `dizel`, `ev`, `benzin/plin`, `hibrid`.\n\n## Service\n\nLinks a `Car` to a `worker` (User) for a specific date. Stores labor price/description and odometer reading. Parts are a cascade-delete-orphan relationship.\n\n### Derived price properties\n\n| Property | Formula | Meaning |\n|----------|---------|---------|\n| `parts_total_full` | \u03a3 part.line_full | What the customer pays for parts |\n| `parts_total_cost` | \u03a3 part.line_cost | Shop's actual parts cost |\n| `parts_profit` | full \u2212 cost | Margin on parts |\n| `total_full` | labor + parts_full | Total charged to customer |\n| `total_profit` | labor + parts_profit | Shop's total profit |\n\nThese properties drive the [Pricing & Profit Model](../architecture/pricing.md) used throughout [Reports](reports.md) and [Printing](printing.md).\n\n## Part\n\nEach part has two price columns:\n- `price` \u2014 retail / full price (what the customer sees).\n- `price_with_discount` \u2014 shop's purchase cost (with supplier discount).\n\nLine totals multiply by `quantity`:\n- `line_full = price \u00d7 quantity`\n- `line_cost = price_with_discount \u00d7 quantity`\n- `line_profit = line_full \u2212 line_cost`\n\n## Connections\n\n- Used by every blueprint: [Service Records](services.md), [Car Management](cars.md), [Authentication & Users](auth.md), [Reports & Analytics](reports.md), [Printing & PDF](printing.md)\n- Created/migrated by `init_db.py`\n- Pricing logic documented in [Pricing & Profit Model](../architecture/pricing.md)\n\n# Citations\n- app/models.py:1\n- app/models.py:9\n- app/models.py:15\n- app/models.py:30\n- app/models.py:48\n- app/models.py:59\n- app/models.py:89\n- app/models.py:104\n- app/models.py:112\n- app/models.py:131\n- app/models.py:141", "files/app/printing": "# Printing & PDF\n\n`app/printing.py` defines the `print_bp` blueprint for generating printable views of service records. Two output formats are supported: **HTML** (opens the browser's print dialog) and **PDF** (downloadable file via xhtml2pdf). Each format has two modes: **customer** copy and **owner** copy.\n\n## Print modes\n\n| Mode | Content shown | Use case |\n|------|--------------|----------|\n| **Customer** (`mode=customer`) | Parts at retail price only, no labor price, no profit | Receipt for the car owner |\n| **Owner** (`mode=owner`) | Full breakdown: labor, retail + cost prices, profit margins | Internal record for the shop owner |\n\n## Endpoints\n\n| Route | Function | Output |\n|-------|----------|--------|\n| `/print/service/<id>` | `service()` | HTML print of one service |\n| `/print/car/<id>` | `car()` | HTML print of all services for a car |\n| `/pdf/service/<id>` | `service_pdf()` | PDF download of one service |\n| `/pdf/car/<id>` | `car_pdf()` | PDF download of all car services |\n\nAll routes accept a `?mode=customer|owner` query parameter (defaults to `customer`).\n\n## Context builders\n\nTwo private functions build the template context:\n- `_service_context(service_id)` \u2014 single service with its car.\n- `_car_context(car_id)` \u2014 all services for a car, sorted by date ascending. Workers see only their own services.\n\nBoth enforce access control via `_can_access()` (same logic as [Service Records](services.md)).\n\n## PDF generation (`app/pdf.py`)\n\n`render_pdf(html)` converts an HTML string to PDF bytes using `xhtml2pdf.pisa`. Key details:\n\n- **DejaVu Sans font** is registered directly with ReportLab (not via CSS `@font-face`) to avoid a Windows temp-file lock bug. This ensures Serbian characters (\u010d, \u0107, \u0111, \u0161, \u017e) render correctly.\n- **Link callback** maps `/static/...` and `/media/...` URLs to absolute filesystem paths so images (logo, car photos) embed in the PDF.\n- A dedicated template `print/pdf.html` uses table-based layout because xhtml2pdf supports only a subset of CSS (no flexbox).\n\n```mermaid\nflowchart LR\n    Route[\"print_bp route\"] --> Context[\"Build context\"]\n    Context --> Template[\"Render print/pdf.html\"]\n    Template --> xhtml2pdf[\"pisa.CreatePDF()\"]\n    xhtml2pdf --> Font[\"DejaVu Sans (ReportLab)\"]\n    xhtml2pdf --> LinkCB[\"_link_callback()\"]\n    LinkCB --> Static[\"static/ files\"]\n    LinkCB --> Media[\"uploads/ images\"]\n    xhtml2pdf --> PDF[\"PDF bytes \u2192 Response\"]\n```\n\n## Connections\n\n- Uses [Data Models](models.md) \u2014 `Service`, `Car`\n- Access control same as [Service Records](services.md)\n- PDF font and layout separate from HTML print template\n- Linked from [Car Management](cars.md) detail page and [Service Records](services.md) detail page\n\n# Citations\n- app/printing.py:1\n- app/printing.py:13\n- app/printing.py:18\n- app/printing.py:29\n- app/printing.py:44\n- app/printing.py:50\n- app/printing.py:57\n- app/printing.py:72\n- app/printing.py:79\n- app/pdf.py:1\n- app/pdf.py:17\n- app/pdf.py:36\n- app/pdf.py:47", "files/app/reports": "# Reports & Analytics\n\n`app/reports.py` defines the `reports_bp` blueprint providing two main features: **journals** (periodic service summaries) and **analytics** (interactive profit/revenue charts).\n\n## Journals (`/reports`)\n\nJournals summarize services for a selected period (day / week / month) and scope (single worker or shop-wide \"all\"). The `compose_journal()` function is the core \u2014 it's a **pure function** (doesn't read `current_user`) so it can be called from both web requests and the background [Scheduler](../architecture/scheduler.md).\n\n### Journal flow\n\n```mermaid\nsequenceDiagram\n    participant User as Admin/Worker\n    participant Reports as reports_bp\n    participant DB as SQLite\n    participant Email as email_utils\n\n    User->>Reports: GET /reports?period=day&scope=me\n    Reports->>DB: Query services in date range\n    DB-->>Reports: Service list\n    Reports->>Reports: summarize() + per-worker breakdown\n    Reports-->>User: Rendered journal page\n\n    User->>Reports: POST /reports/send\n    Reports->>Reports: compose_journal()\n    Reports->>Email: send_email(recipients, subject, html)\n    Email-->>User: Flash success/failure\n```\n\n### Scope resolution\n\n`_resolve_scope(scope, worker_param)` enforces permissions:\n- Workers always see only their own data regardless of `scope` parameter.\n- Admins can choose: `\"me\"` (themselves), `\"all\"` (shop-wide), or `\"worker:<id>\"` (specific worker).\n\n### Summarize function\n\n`summarize(services)` returns a dict with: `count`, `parts_full`, `parts_cost`, `parts_profit`, `labor`, `revenue`, `profit`. Used for both overall totals and per-worker breakdowns.\n\n## Analytics (`/analytics`)\n\nA custom date-range analysis page with four Chart.js charts:\n1. **Revenue/profit over time** \u2014 bar + line combo chart (daily or monthly buckets).\n2. **Revenue structure** \u2014 doughnut: parts (retail) vs. labor.\n3. **Parts price comparison** \u2014 bar: retail vs. cost vs. margin.\n4. **Profit per worker** \u2014 horizontal bar (admin-only, shop-wide scope).\n\nThe `_build_charts()` function assembles all chart data server-side as JSON, embedded into the template as a `#chartData` element consumed by [analytics.js](../modules/app/static/js.md).\n\n### Time bucketing\n\nFor ranges over 62 days, data is bucketed monthly (labeled with abbreviated Serbian month names via `SR_MONTHS`). Shorter ranges use daily buckets.\n\n## E-mail delivery\n\nThe `send()` endpoint delivers a journal via e-mail:\n- **Worker journal** \u2192 sent to the worker's e-mail.\n- **Overall journal** \u2192 sent to all active admins.\n\nUses `send_email()` from `app/email_utils.py` (SMTP, configurable via [Configuration](../architecture/configuration.md)).\n\n## Key symbols\n\n| Symbol | Role |\n|--------|------|\n| `compose_journal(period, ref, worker, scope_label)` | Build journal dict (reusable from scheduler) |\n| `summarize(services)` | Aggregate financials for a service list |\n| `_build_charts(...)` | Assemble Chart.js data series |\n| `index()` | GET `/reports` \u2014 journal page |\n| `send()` | POST `/reports/send` \u2014 e-mail journal |\n| `analytics()` | GET `/analytics` \u2014 charts page |\n\n## Connections\n\n- Uses [Data Models](models.md) \u2014 `Service`, `User`\n- Called by [Scheduler](../architecture/scheduler.md) for automatic journal dispatch\n- Formatting via [Utilities](utils.md) (`period_range`, `sr_date`, `PERIOD_LABELS`, `SR_MONTHS`)\n- Charts rendered by [Frontend & Static Assets](../modules/app/static/js.md) (`analytics.js`)\n- SMTP via `email_utils.py`, configured in [Configuration](../architecture/configuration.md)\n\n# Citations\n- app/reports.py:1\n- app/reports.py:18\n- app/reports.py:80\n- app/reports.py:91\n- app/reports.py:102\n- app/reports.py:115\n- app/reports.py:144\n- app/reports.py:172\n- app/reports.py:206\n- app/email_utils.py:1", "files/app/services": "# Service Records\n\n`app/services.py` defines the `services_bp` blueprint \u2014 the core business logic of the application. It implements the **plate-first workflow** for creating service records, plus CRUD operations for managing them.\n\n## Plate-first workflow\n\nThe design philosophy: a mechanic starts by entering the car's license plate, not by navigating menus.\n\n```mermaid\nflowchart TD\n    A[\"Worker enters plate\"] --> B{\"Car exists?\"}\n    B -->|Yes| C[\"Redirect to new service form\"]\n    B -->|No| D[\"Redirect to car registration\"]\n    D --> E[\"Register car (plate pre-filled)\"]\n    E --> C\n    C --> F[\"Fill parts + labor + date\"]\n    F --> G[\"Save service + recompute mileage\"]\n```\n\n## Endpoints\n\n| Route | Method | Function | Description |\n|-------|--------|----------|-------------|\n| `/service/start` | GET/POST | `start()` | Enter plate \u2192 find or register car |\n| `/service/new?car_id=X` | GET/POST | `new()` | Create service for car X |\n| `/service/<id>` | GET | `detail(id)` | View service details |\n| `/service/<id>/edit` | GET/POST | `edit(id)` | Edit service |\n| `/service/<id>/delete` | POST | `delete(id)` | Delete service |\n| `/services` | GET | `list_services()` | List all services (filterable by plate) |\n\n## Access control\n\nThe helper `_can_access(service)` returns `True` if the current user is admin or is the worker who created the service. Used on detail, edit, and delete routes \u2014 non-matching workers get a 403.\n\n## Parts management\n\n`_rebuild_parts(service, form)` replaces the service's entire parts list on every save:\n1. Deletes all existing `Part` rows.\n2. Reads parallel form arrays: `part_name[]`, `part_qty[]`, `part_price[]`, `part_disc[]`.\n3. Creates new `Part` objects with name, quantity, retail price, and discounted (cost) price.\n\nThis approach keeps the form simple (add/remove rows dynamically via [Frontend JS](../modules/app/static/js.md)) and avoids partial-update complexity.\n\n## Mileage recompute\n\n`_recompute_car_mileage(car)` finds the most recent service (by date, then id) with a non-null mileage reading and sets `car.mileage` to that value. This ensures:\n- Editing an older service never overwrites a newer odometer reading.\n- Deleting the latest service falls back to the previous reading.\n\nCalled after every create, edit, and delete.\n\n## Form helpers\n\n- `_apply_service_form(service, form)` \u2014 parses date, mileage, labor price, and labor description from the POST data.\n- `_to_int(value)` / `_to_float(value)` \u2014 tolerant parsers that strip spaces and handle comma/dot decimal separators (Serbian locale).\n\n## Connections\n\n- Uses [Data Models](models.md) \u2014 `Car`, `Service`, `Part`\n- Plate normalization mirrors [Car Management](cars.md)\n- Dynamic form powered by [Frontend & Static Assets](../modules/app/static/js.md) (`service_form.js`)\n- Results feed into [Reports & Analytics](reports.md) and [Printing & PDF](printing.md)\n- Pricing logic documented in [Pricing & Profit Model](../architecture/pricing.md)\n\n# Citations\n- app/services.py:1\n- app/services.py:15\n- app/services.py:19\n- app/services.py:22\n- app/services.py:42\n- app/services.py:65\n- app/services.py:93\n- app/services.py:107\n- app/services.py:125\n- app/services.py:140\n- app/services.py:155\n- app/services.py:169\n- app/services.py:186", "files/app/utils": "# Utilities\n\n`app/utils.py` provides small helper functions used across the application for formatting, image handling, and date period calculations.\n\n## Functions\n\n### `format_currency(value) \u2192 str`\n\nFormats a number in Serbian style: `12.345,67 RSD`. Uses dot as thousands separator and comma as decimal separator. The currency code is taken from `app.config[\"CURRENCY\"]` (default `\"RSD\"`).\n\nRegistered as a Jinja2 filter `currency` in the [Application Factory](../../modules/app.md).\n\n### `sr_date(value) \u2192 str`\n\nFormats a date as `\"5. jul 2026.\"` using Serbian month names from `SR_MONTHS`. Registered as the Jinja2 filter `srdate`.\n\n### `allowed_image(filename) \u2192 bool`\n\nChecks if a filename has an allowed image extension: `png`, `jpg`, `jpeg`, `gif`, `webp`, `bmp`.\n\n### `save_image(file_storage, subdir, max_dim=1280) \u2192 str`\n\nSaves an uploaded image to `UPLOAD_FOLDER/<subdir>/` with a UUID-based filename:\n\n1. Validates the file extension via `allowed_image()`\n2. Creates the target directory if needed\n3. If Pillow is available, opens the image, converts RGBA/P to RGB for JPEG, and thumbnails to `max_dim` pixels\n4. Returns the path relative to `UPLOAD_FOLDER` (e.g., `\"cars/abc123.jpg\"`)\n\nUsed by [Car Management](cars.md) (car photos) and [Dashboard & Setup](main.md) (company logo, `max_dim=600`).\n\n### `period_range(period, ref=None) \u2192 (start_date, end_date)`\n\nReturns inclusive date boundaries for `\"day\"`, `\"week\"`, or `\"month\"`:\n\n| Period | Start | End |\n|--------|-------|-----|\n| `day` | ref | ref |\n| `week` | Monday of ref's week | Sunday of ref's week |\n| `month` | 1st of ref's month | Last day of ref's month |\n\nUsed by [Dashboard & Setup](main.md) (today/month stats) and [Reports & Analytics](reports.md) (journal date ranges).\n\n## Constants\n\n| Constant | Value | Usage |\n|----------|-------|-------|\n| `ALLOWED_IMAGE_EXT` | `{\"png\", \"jpg\", \"jpeg\", \"gif\", \"webp\", \"bmp\"}` | Image upload validation |\n| `FUEL_LABELS` | `{\"benzin\": \"Benzin\", ...}` | UI display labels for fuel types |\n| `ROLE_LABELS` | `{\"admin\": \"Administrator\", \"radnik\": \"Radnik\"}` | UI display labels for roles |\n| `PERIOD_LABELS` | `{\"day\": \"Dnevni\", \"week\": \"Nedeljni\", \"month\": \"Mese\u010dni\"}` | Journal period labels |\n| `SR_MONTHS` | 13-element list of Serbian month names | Date formatting |\n\n## Connections\n\n- Jinja2 filters registered in \u2192 [Application Factory](../../modules/app.md)\n- Used by \u2192 [Dashboard & Setup](main.md), [Car Management](cars.md), [Reports & Analytics](reports.md), [Background Scheduler](../architecture/scheduler.md)\n- Image handling powered by Pillow (listed in `requirements.txt`)\n\n# Citations\n\n- app/utils.py:1\n- app/utils.py:16\n- app/utils.py:27\n- app/utils.py:30\n- app/utils.py:39\n- app/utils.py:50\n- app/utils.py:57\n- app/utils.py:62\n- app/utils.py:93", "modules/app/static/js": "# Frontend Assets\n\nThe `app/static/js/` directory contains three custom JavaScript modules plus two vendor libraries (Chart.js and Bootstrap). All scripts are vanilla ES5 IIFEs (no build step required).\n\n## Custom Modules\n\n### `analytics.js` (73 LOC)\nRenders four Chart.js charts on the `/analytics` page. Reads chart data from a `<script id=\"chartData\">` JSON block embedded by the server.\n\n**Charts rendered:**\n- `#chTime` \u2014 combo bar + line chart: revenue (bars) and profit (line) over time\n- `#chStruct` \u2014 doughnut chart: revenue structure (parts vs labor)\n- `#chParts` \u2014 bar chart: parts full price vs discounted vs margin\n- `#chWorker` \u2014 horizontal bar chart: profit per worker (admin-only)\n\nAll monetary values are formatted with `Number.toLocaleString(\"sr-RS\")` plus the configured currency code.\n\n### `service_form.js` (61 LOC)\nManages the dynamic parts table on the service create/edit form:\n\n- **`recalc()`** \u2014 iterates all `.part-row` elements, computes `qty \u00d7 price` for each, updates line totals and the summary (parts total, labor, grand total)\n- **`addRow()`** \u2014 clones the `<template id=\"partRowTemplate\">` and appends to `#partsBody`\n- **Event delegation** \u2014 listens for `click` (add/remove part) and `input` (qty/price/disc/labor changes) events at the document level\n- Starts with one empty row if none exist on DOM load\n\n### `theme.js` (22 LOC)\nImplements the dark/light theme toggle:\n- Reads/writes the `data-bs-theme` attribute on `<html>` (Bootstrap 5 dark mode)\n- Persists the choice in `localStorage`\n- Updates the toggle button icon (\u2600\ufe0f / \ud83c\udf19)\n\n## Vendor Libraries\n\n| File | Purpose |\n|------|---------|\n| `chart.umd.min.js` | Chart.js 4.x UMD bundle |\n| `bootstrap.bundle.min.js` | Bootstrap 5 JS + Popper |\n\n## Key Connections\n\n- [Reports & Analytics](../../files/app/reports.md) \u2014 `_build_charts()` prepares the JSON data consumed by `analytics.js`\n- [Service Records](../../files/app/services.md) \u2014 service form uses `service_form.js`\n- [Pricing & Profit Model](../../architecture/pricing.md) \u2014 `service_form.js` mirrors the pricing logic client-side\n- [Overview](../../overview.md)\n\n# Citations\n\n- app/static/js/analytics.js:1-3 (IIFE, reads chartData JSON element)\n- app/static/js/analytics.js:10-11 (Serbian money formatting with sr-RS locale)\n- app/static/js/analytics.js:21-38 (chTime \u2014 combo bar+line chart)\n- app/static/js/analytics.js:40-47 (chStruct \u2014 doughnut chart)\n- app/static/js/analytics.js:49-57 (chParts \u2014 bar chart)\n- app/static/js/analytics.js:59-68 (chWorker \u2014 horizontal bar chart)\n- app/static/js/service_form.js:1-2 (IIFE start)\n- app/static/js/service_form.js:10-26 (recalc \u2014 live price computation)\n- app/static/js/service_form.js:28-32 (addRow \u2014 template cloning)\n- app/static/js/service_form.js:34-46 (event delegation for click and input)\n- app/static/js/theme.js:1-22 (dark/light toggle with localStorage persistence)", "modules/app": "# Application Factory\n\nThe `app/__init__.py` module implements the **Flask application factory pattern** via `create_app()`. This single function is the bootstrap point for the entire application \u2014 it configures extensions, registers all seven blueprints, sets up Jinja template helpers, security middleware, error handlers, and optionally starts the background scheduler.\n\n## How `create_app()` works\n\n1. **Create the Flask instance** and load the `Config` class.\n2. **Ensure directories** exist: `INSTANCE_DIR`, `BACKUP_DIR`, and upload sub-folders (`cars/`, `logo/`).\n3. **Reverse-proxy support**: if `TRUST_PROXY` is set, applies Werkzeug's `ProxyFix` middleware for correct `X-Forwarded-*` header handling (needed when behind nginx on the Pi).\n4. **Initialise extensions**: `db` (SQLAlchemy), `login_manager` (Flask-Login), `csrf` (Flask-WTF CSRF protection) \u2014 all defined in `extensions.py`.\n5. **Register blueprints**: `auth_bp`, `main_bp`, `cars_bp`, `services_bp`, `reports_bp`, `print_bp`, `backup_bp`.\n6. **Media route**: `/media/<path:filename>` serves uploaded files (login-required).\n7. **Jinja helpers**: `currency` and `srdate` filters, plus context-injected globals (`company`, `FUEL_LABELS`, `ROLE_LABELS`, `PERIOD_LABELS`, `currency_code`).\n8. **Before-request hook**: rejects (logs out) deactivated users mid-session.\n9. **After-request hook**: sets security headers (CSP, X-Frame-Options, X-Content-Type-Options, Referrer-Policy).\n10. **Error handlers**: 403, 404, 413, 500, and CSRFError (400).\n11. **Scheduler**: if `ENABLE_SCHEDULER` is true, starts APScheduler via `start_scheduler(app)`.\n\n## SQLite pragmas\n\nA SQLAlchemy engine-level `connect` listener (applied globally) sets three pragmas on every new database connection:\n\n- `PRAGMA journal_mode=WAL` \u2014 Write-Ahead Logging for better concurrent reads.\n- `PRAGMA foreign_keys=ON` \u2014 enforces FK constraints.\n- `PRAGMA busy_timeout=30000` \u2014 30-second wait instead of immediate \"database is locked\" errors.\n\nThis is critical for reliable operation on the Pi under light concurrent use.\n\n## Key symbols\n\n| Symbol | Role |\n|--------|------|\n| `create_app(config_class)` | Factory function; returns configured Flask app |\n| `_set_sqlite_pragma()` | Engine connect listener for SQLite tuning |\n| `_reject_deactivated()` | Before-request hook to log out disabled users |\n| `_security_headers()` | After-request hook adding CSP and other headers |\n\n## Connections\n\n- Loads settings from [Configuration](../architecture/configuration.md)\n- Uses extensions from `extensions.py` (`db`, `login_manager`, `csrf`)\n- Registers blueprints documented in: [Authentication & Users](../files/app/auth.md), [Dashboard & Setup](../files/app/main.md), [Car Management](../files/app/cars.md), [Service Records](../files/app/services.md), [Reports & Analytics](../files/app/reports.md), [Printing & PDF](../files/app/printing.md), [Backup System](../files/app/backup.md)\n- Optionally starts the [Scheduler](../architecture/scheduler.md)\n- Injects helpers from [Utilities](../files/app/utils.md) into Jinja\n\n```mermaid\nflowchart TD\n    create_app[\"create_app()\"] --> Config[\"Config class\"]\n    create_app --> Extensions[\"db / login_manager / csrf\"]\n    create_app --> BP[\"7 Blueprints\"]\n    create_app --> Jinja[\"Jinja filters + context\"]\n    create_app --> Security[\"Security headers + hooks\"]\n    create_app --> Errors[\"Error handlers\"]\n    create_app --> Sched[\"start_scheduler (optional)\"]\n    BP --> auth_bp\n    BP --> main_bp\n    BP --> cars_bp\n    BP --> services_bp\n    BP --> reports_bp\n    BP --> print_bp\n    BP --> backup_bp\n```\n\n# Citations\n- app/__init__.py:1\n- app/__init__.py:17\n- app/__init__.py:30\n- app/__init__.py:39\n- app/__init__.py:61\n- app/__init__.py:76\n- app/__init__.py:86\n- app/__init__.py:93\n- app/__init__.py:100\n- app/__init__.py:130\n- app/extensions.py:1", "overview": "# Overview\n\n**Auto Servis** is a lightweight web application for managing an auto mechanic shop. Built with Python (Flask) and SQLite, it is designed to run on hardware as modest as a **Raspberry Pi Zero 2W** \u2014 no Docker required \u2014 as well as on Windows for development and testing.\n\nThe interface language is **Serbian (Latin script)**.\n\n## What it does\n\n- **Two account types**: administrator and worker (radnik). The first registered user automatically becomes admin.\n- **Vehicle registry** by license plate, tracking owner, mileage, brand/model/engine/fuel/year, and photo.\n- **Service records** with a parts table (retail vs. cost price), labor description + price, date, and mileage update.\n- **Plate-first workflow**: enter a plate \u2192 if the car exists, create a service; if not, register it first, then proceed.\n- **Printing**: customer copy (no labor, retail prices only) and owner copy (full breakdown with profit). Available as browser print or PDF download.\n- **Journals**: daily / weekly / monthly reports by worker or shop-wide, with e-mail delivery via SMTP.\n- **Analytics**: profit charts, parts price comparison (retail vs. cost vs. margin), revenue structure \u2014 powered by Chart.js.\n- **Backups**: consistent SQLite online-backup zipped with uploaded media, with admin UI and automatic nightly scheduling.\n\n## Tech stack\n\n| Layer | Technology |\n|-------|-----------|\n| Backend | Python 3, Flask 3.0, Flask-SQLAlchemy, Flask-Login, Flask-WTF |\n| Database | SQLite (WAL mode, busy timeout for Pi concurrency) |\n| WSGI server | Waitress (pure-Python, cross-platform) |\n| PDF | xhtml2pdf + DejaVu Sans font for Serbian glyphs |\n| Images | Pillow (resize on upload) |\n| Scheduler | APScheduler (journal e-mails + nightly backup) |\n| Frontend | Bootstrap 5, Chart.js, custom JS (dark theme, dynamic parts form) |\n| Config | python-dotenv (.env file) |\n\n## Architecture\n\nThe application follows the **Flask app-factory pattern**. `create_app()` in `app/__init__.py` initialises extensions, registers seven blueprints, sets up Jinja filters, security headers, error handlers, and optionally starts the background scheduler.\n\n```mermaid\nflowchart TD\n    Client[\"Browser\"] -->|HTTP| Waitress[\"serve.py (Waitress)\"]\n    Waitress --> AppFactory[\"create_app()\"]\n    AppFactory --> AuthBP[\"auth_bp\"]\n    AppFactory --> MainBP[\"main_bp\"]\n    AppFactory --> CarsBP[\"cars_bp\"]\n    AppFactory --> ServicesBP[\"services_bp\"]\n    AppFactory --> ReportsBP[\"reports_bp\"]\n    AppFactory --> PrintBP[\"print_bp\"]\n    AppFactory --> BackupBP[\"backup_bp\"]\n    AuthBP --> DB[\"SQLite (carservice.db)\"]\n    MainBP --> DB\n    CarsBP --> DB\n    ServicesBP --> DB\n    ReportsBP --> DB\n    ReportsBP --> SMTP[\"SMTP (e-mail)\"]\n    PrintBP --> PDF[\"xhtml2pdf\"]\n    BackupBP --> DB\n```\n\n## Key pages in this wiki\n\n- [Application Factory](modules/app.md) \u2014 how the app is wired together\n- [Data Models](files/app/models.md) \u2014 User, Company, Car, Service, Part\n- [Authentication & Users](files/app/auth.md) \u2014 login, roles, throttling\n- [Dashboard & Setup](files/app/main.md) \u2014 home page and company config\n- [Car Management](files/app/cars.md) \u2014 vehicle CRUD\n- [Service Records](files/app/services.md) \u2014 the plate-first workflow\n- [Reports & Analytics](files/app/reports.md) \u2014 journals and charts\n- [Printing & PDF](files/app/printing.md) \u2014 print views and PDF export\n- [Backup System](files/app/backup.md) \u2014 database backup and restore\n- [Utilities](files/app/utils.md) \u2014 formatting, images, periods\n- [Scheduler](architecture/scheduler.md) \u2014 automatic journal e-mails and backups\n- [Frontend & Static Assets](modules/app/static/js.md) \u2014 JS and UI\n- [Security Architecture](architecture/security.md) \u2014 CSRF, headers, throttling\n- [Pricing & Profit Model](architecture/pricing.md) \u2014 revenue vs. cost vs. profit\n- [Configuration](architecture/configuration.md) \u2014 .env settings\n- [Deployment](architecture/deployment.md) \u2014 Pi, Windows, systemd\n\n# Citations\n- README.md:1\n- app/__init__.py:1\n- app/__init__.py:30\n- app/__init__.py:61\n- app/__init__.py:130\n- serve.py:1\n- requirements.txt:1\n- app/config.py:1"}, "types": ["Architecture", "Data Flow", "Entrypoint", "File", "Module", "Repo"], "palette": {"Repo": "#0ea5e9", "Module": "#3b82f6", "File": "#22c55e", "Architecture": "#a855f7", "API Endpoint": "#ec4899", "Data Flow": "#f97316", "Entrypoint": "#eab308", "Reference": "#10b981", "BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6"}};

<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — VIO Wiki`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Mermaid: manual render mode so we control which subtree runs.
  let mermaidReady = false;
  if (window.mermaid) {
    try {
      mermaid.initialize({ startOnLoad: false, securityLevel: "strict", theme: "neutral" });
      mermaidReady = true;
    } catch (_e) { mermaidReady = false; }
  }
  let _mermaidSeq = 0;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  // ── Build the link tree (left sidebar) ──
  // Group concepts by their id prefix (the directory), e.g.
  // "architecture/auth" -> group "architecture". Top-level ids form roots.
  const treeItemEls = {};   // conceptId -> <li class=tree-item>
  (function buildTree() {
    const groups = {};       // prefix -> [ids]
    const roots = [];        // ids with no "/"
    for (const n of bundle.nodes) {
      const id = n.data.id;
      const slash = id.indexOf("/");
      if (slash === -1) {
        roots.push(id);
      } else {
        const prefix = id.slice(0, id.lastIndexOf("/"));
        (groups[prefix] ||= []).push(id);
      }
    }
    const byLabel = (a, b) =>
      (nodeIndex[a]?.label || a).localeCompare(nodeIndex[b]?.label || b);

    const list = document.getElementById("tree-list");
    const makeItem = (id) => {
      const li = document.createElement("li");
      li.className = "tree-item";
      li.title = id;
      const dot = document.createElement("span");
      dot.className = "tree-dot";
      dot.style.background = nodeIndex[id]?.color || "#94a3b8";
      const label = document.createElement("span");
      label.textContent = nodeIndex[id]?.label || id;
      li.appendChild(dot);
      li.appendChild(label);
      li.addEventListener("click", () => showDetail(id));
      treeItemEls[id] = li;
      return li;
    };

    // Roots first (Repo/overview usually), then each group as a header + children.
    for (const id of roots.sort(byLabel)) list.appendChild(makeItem(id));
    for (const prefix of Object.keys(groups).sort()) {
      const header = document.createElement("li");
      header.className = "tree-head";
      header.textContent = prefix;
      list.appendChild(header);
      const sub = document.createElement("ul");
      for (const id of groups[prefix].sort(byLabel)) sub.appendChild(makeItem(id));
      list.appendChild(sub);
    }
  })();

  function setActiveTreeItem(conceptId) {
    for (const el of Object.values(treeItemEls)) el.classList.remove("active");
    const el = treeItemEls[conceptId];
    if (el) {
      el.classList.add("active");
      el.scrollIntoView({ block: "nearest" });
    }
  }

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("fit-graph").addEventListener("click", () => {
    cy.resize();
    cy.fit(null, 30);
  });

  document.getElementById("reset-graph").addEventListener("click", () => {
    cy.layout({ name: document.getElementById("layout").value, animate: false, padding: 30 }).run();
    cy.resize();
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    setActiveTreeItem(conceptId);

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl, conceptId);
    renderMermaidIn(bodyEl);
    highlightCodeIn(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    if (node && !document.body.classList.contains("graph-hidden")) {
      cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
    }
  }

  // Normalise a markdown link target to a concept-id, tolerant of every
  // cross-link style: bare id (`architecture/auth`), relative `.md`
  // (`auth.md`, `../files/srv.md`), absolute `/architecture/auth.md`.
  // Returns the first candidate that maps to a real node, else null.
  function resolveConceptId(href, fromId) {
    if (!href) return null;
    let raw = href.split("#")[0].trim();
    if (!raw || raw.includes("://") || raw.startsWith("mailto:")) return null;

    const selfDir = fromId && fromId.includes("/")
      ? fromId.slice(0, fromId.lastIndexOf("/"))
      : "";
    const strip = (s) => s.replace(/\.md$/, "").replace(/^\/+/, "").replace(/\/+$/, "");
    const candidates = [];

    if (raw.startsWith("/")) {
      candidates.push(strip(raw));
    } else if (raw.endsWith(".md") || raw.includes("/") || raw.startsWith(".")) {
      // resolve relative path against this doc's directory
      const base = selfDir ? selfDir.split("/") : [];
      for (const part of strip(raw).split("/")) {
        if (part === "..") base.pop();
        else if (part !== "." && part !== "") base.push(part);
      }
      candidates.push(base.join("/"));
      candidates.push(strip(raw));               // bundle-root-relative literal
      const lit = strip(raw);
      if (selfDir && !lit.includes("/")) candidates.push(`${selfDir}/${lit}`);
    } else {
      candidates.push(raw);                      // bare token
      if (selfDir) candidates.push(`${selfDir}/${raw}`);
    }

    for (const cid of candidates) {
      if (cid && nodeIndex[cid]) return cid;
    }
    return null;
  }

  // Syntax-highlight non-mermaid fenced code blocks with Prism (autoloader
  // pulls the grammar on demand). Mirrors VIO's in-chat code rendering.
  function highlightCodeIn(root) {
    if (typeof Prism === "undefined") return;
    const blocks = root.querySelectorAll("pre > code[class*='language-']");
    blocks.forEach((code) => {
      if (code.classList.contains("language-mermaid")) return;
      const pre = code.parentElement;
      if (pre && pre.tagName === "PRE") {
        pre.classList.add("code-block");
        if (!pre.hasAttribute("tabindex")) pre.setAttribute("tabindex", "0");
      }
      try { Prism.highlightElement(code); } catch (e) { /* leave plain */ }
    });
  }

  // Render ```mermaid fenced blocks (marked emits <pre><code class="language-mermaid">)
  // into SVG. Falls back to the raw code block on any parse error — never blank.
  function renderMermaidIn(root) {
    if (!mermaidReady) return;
    const blocks = root.querySelectorAll("pre > code.language-mermaid, code.language-mermaid");
    blocks.forEach((code) => {
      const pre = code.closest("pre") || code;
      const src = code.textContent || "";
      const id = "mmd-" + (_mermaidSeq++);
      mermaid.render(id, src).then(({ svg }) => {
        const fig = document.createElement("figure");
        fig.className = "mermaid-figure";
        fig.innerHTML = svg;
        // Mermaid stamps a fixed width/height + inline `max-width:<px>` on the
        // SVG. On a narrow pane that squeezes the diagram and clips edge text
        // (the lightbox looked fine only because openLightbox strips these).
        // Drop them so the figure CSS (max-width:100% + horizontal scroll)
        // governs sizing and nothing gets cropped.
        var inlineSvg = fig.querySelector("svg");
        if (inlineSvg) {
          inlineSvg.removeAttribute("width");
          inlineSvg.removeAttribute("height");
          inlineSvg.style.maxWidth = "100%";
          inlineSvg.style.width = "100%";
          inlineSvg.style.height = "auto";
        }
        fig.title = "Click to zoom";
        fig.addEventListener("click", () => openLightbox(fig.innerHTML));
        pre.replaceWith(fig);
      }).catch(() => {
        pre.classList.add("mermaid-error");
      });
    });
  }

  function openLightbox(svgHtml) {
    let lb = document.getElementById("mermaid-lightbox");
    if (!lb) {
      lb = document.createElement("div");
      lb.id = "mermaid-lightbox";
      lb.addEventListener("click", () => { lb.style.display = "none"; lb.innerHTML = ""; });
      document.body.appendChild(lb);
    }
    lb.innerHTML = '<div class="mermaid-lightbox-inner">' + svgHtml + "</div>";
    var svg = lb.querySelector("svg");
    if (svg) {
      // Mermaid stamps an inline max-width (its natural px width) on the SVG,
      // which would cap the zoomed view to a tiny size. Clear it so the
      // lightbox CSS can scale the diagram up to fill the viewport.
      svg.style.maxWidth = "none";
      svg.style.width = "100%";
      svg.style.height = "auto";
      svg.removeAttribute("width");
      svg.removeAttribute("height");
    }
    lb.style.display = "flex";
  }

  function rewriteInternalLinks(root, fromId) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      const target = resolveConceptId(href, fromId);
      if (target) {
        a.className = "internal";
        a.setAttribute("href", "javascript:void(0)");
        a.addEventListener("click", (e) => {
          e.preventDefault();
          showDetail(target);
        });
        return;
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // ── Toggle graph visibility — collapse leaves a reopen button ──
  const toggleBtn = document.getElementById("toggle-graph");
  const graphReopen = document.getElementById("graph-reopen");
  function setGraphHidden(hidden) {
    document.body.classList.toggle("graph-hidden", hidden);
    if (graphReopen) graphReopen.hidden = !hidden;
    if (!hidden) {
      // Graph re-shown: cytoscape needs a resize + refit after display change.
      cy.resize();
      cy.fit(null, 30);
    }
  }
  toggleBtn.addEventListener("click", () => setGraphHidden(true));
  if (graphReopen) graphReopen.addEventListener("click", () => setGraphHidden(false));

  // ── Toggle page-tree visibility — collapse leaves a reopen button ──
  const toggleTreeBtn = document.getElementById("toggle-tree");
  const treeReopen = document.getElementById("tree-reopen");
  function setTreeHidden(hidden) {
    document.body.classList.toggle("tree-hidden", hidden);
    if (treeReopen) treeReopen.hidden = !hidden;
  }
  toggleTreeBtn.addEventListener("click", () => setTreeHidden(true));
  if (treeReopen) treeReopen.addEventListener("click", () => setTreeHidden(false));

  // ── Auto-fit the graph whenever its pane changes size (drag-resize,
  //    window resize, show/hide of sibling panes). Debounced via rAF. ──
  (function autoFitGraph() {
    if (typeof ResizeObserver === "undefined") return;
    const pane = document.getElementById("graph-pane");
    let raf = 0;
    const ro = new ResizeObserver(() => {
      if (document.body.classList.contains("graph-hidden")) return;
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        raf = 0;
        cy.resize();
        cy.fit(null, 30);
      });
    });
    ro.observe(pane);
  })();

  // True when the panes are stacked vertically (narrow embed). In that mode the
  // two gutters act as horizontal row-resizers (drag on the Y axis).
  const isStacked = () => window.matchMedia("(max-width: 520px)").matches;

  // ── Drag-resize the page tree against the content (col when wide, row when stacked) ──
  (function initTreeResize() {
    const gutter = document.getElementById("tree-gutter");
    const tree = document.getElementById("tree");
    let dragging = false;
    gutter.addEventListener("mousedown", (e) => {
      dragging = true;
      gutter.classList.add("dragging");
      document.body.style.userSelect = "none";
      document.body.style.cursor = isStacked() ? "row-resize" : "col-resize";
      e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      const rect = tree.getBoundingClientRect();
      if (isStacked()) {
        let h = e.clientY - rect.top;
        h = Math.max(90, Math.min(h, window.innerHeight - 200));
        tree.style.flex = `0 0 ${h}px`;
        tree.style.height = `${h}px`;
      } else {
        let w = e.clientX - rect.left;
        w = Math.max(150, Math.min(w, 480));
        tree.style.flex = `0 0 ${w}px`;
        tree.style.width = `${w}px`;
      }
    });
    window.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      gutter.classList.remove("dragging");
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    });
  })();

  // ── Drag-resize between the content (middle) and graph pane (right) ──
  (function initResize() {
    const gutter = document.getElementById("gutter");
    const graphPane = document.getElementById("graph-pane");
    const mainEl = document.querySelector("main");
    let dragging = false;

    gutter.addEventListener("mousedown", (e) => {
      dragging = true;
      gutter.classList.add("dragging");
      document.body.style.userSelect = "none";
      document.body.style.cursor = isStacked() ? "row-resize" : "col-resize";
      e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      if (isStacked()) {
        // graph pane occupies from the gutter down to the bottom edge
        const rect = mainEl.getBoundingClientRect();
        let graphH = rect.bottom - e.clientY;
        graphH = Math.max(120, Math.min(graphH, rect.height - 200));
        graphPane.style.flex = `0 0 ${graphH}px`;
        graphPane.style.height = `${graphH}px`;
      } else {
        const rect = mainEl.getBoundingClientRect();
        const min = 240;
        // graph pane occupies from the gutter to the right edge
        let graphW = rect.right - e.clientX;
        const maxGraph = rect.width - min;
        graphW = Math.max(min, Math.min(graphW, maxGraph));
        graphPane.style.flex = `0 0 ${graphW}px`;
      }
    });
    window.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      gutter.classList.remove("dragging");
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
      cy.resize();
    });
  })();

  // Auto-show the first node — prefer Repo > Architecture > Module > first.
  const preferOrder = ["Repo", "Architecture", "Module"];
  let initial = null;
  for (const t of preferOrder) {
    initial = bundle.nodes.find((n) => n.data.type === t);
    if (initial) break;
  }
  initial = initial || bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
